<!DOCTYPE html>
<html lang="de" class="h-100">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NANPOS – NFC Terminal</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha256-PI8n5gCcz9cQqQXm3PEtDuPG8qx9oFsFctPg0S5zb8g=" crossorigin="anonymous">
    <style>
        body { font-family: 'Segoe UI', sans-serif; }
        .card-product { cursor: pointer; transition: transform .1s; }
        .card-product:hover { transform: scale(1.04); }
        .fs-price { font-size: 1.1rem; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="d-flex flex-column h-100 bg-light">

<header class="bg-primary text-white py-2 px-4 d-flex align-items-center justify-content-between flex-shrink-0">
    <span class="fs-4 fw-bold">🍺 NANPOS Terminal</span>
    {% block header_right %}{% endblock %}
</header>

<main class="flex-fill d-flex flex-column">
    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha256-CDOy6cOibCWEdsRiZuaHf8dSGGJRYuBGC+mjoJimHGw=" crossorigin="anonymous"></script>
{% block extra_script %}{% endblock %}
</body>
</html>
