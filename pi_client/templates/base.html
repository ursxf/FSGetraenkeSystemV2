<!DOCTYPE html>
<html lang="de" class="h-100">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NANPOS – NFC Terminal</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha256-PI8n5gCcz9cQqQXm3PEtDuPG8qx9oFsFctPg0S5zb8g=" crossorigin="anonymous">
    <style>
        body { font-family: 'Segoe UI', sans-serif; }
        .card-product { cursor: pointer; transition: transform .1s; }
        .card-product:hover { transform: scale(1.04); }
        .fs-price { font-size: 1.1rem; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="d-flex flex-column h-100 bg-light">

<header class="bg-primary text-white py-2 px-4 d-flex align-items-center justify-content-between flex-shrink-0">
    <span class="fs-4 fw-bold">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" class="bi bi-cup-straw mb-1 me-2" viewBox="0 0 16 16">
          <path d="M13.902.334a.5.5 0 0 1 .49.733l-.422 2.065A1 1 0 0 1 15 5v.5a.5.5 0 0 1-.163.373l-1.462 1.368-1.025 5.584A2 2 0 0 1 10.384 14H5.616a2 2 0 0 1-1.965-1.64L2.625 6.773V5a1 1 0 0 1 1-1.868L3.04 1.067A.5.5 0 0 1 3.96.671l1.246 2.895h4.15l.43-2.11a.5.5 0 0 1 .616-.487zM5.594 4 4.5 1.5l-1.29 2.5zm4.904 0H4.5v1h6.63zM3.468 6 4.6 12.162A1 1 0 0 0 5.584 13h4.832a1 1 0 0 0 .984-.838L12.532 6z"/>
        </svg>NANPOS Terminal
    </span>
    {% block header_right %}{% endblock %}
</header>

<main class="flex-fill d-flex flex-column">
    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha256-CDOy6cOibCWEdsRiZuaHf8dSGGJRYuBGC+mjoJimHGw=" crossorigin="anonymous"></script>
{% block extra_script %}{% endblock %}
</body>
</html>
