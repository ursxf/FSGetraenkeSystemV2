{% extends "base.html" %}

{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center flex-fill text-center p-4">
    <div class="mb-4 text-primary">
        <svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" fill="currentColor" class="bi bi-credit-card-2-front" viewBox="0 0 16 16">
          <path d="M14 3a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1zM2 2a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/>
          <path d="M2 5.5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1-.5-.5zm0 3a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5zm0 2a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 0 1h-1a.5.5 0 0 1-.5-.5zm3 0a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 0 1h-1a.5.5 0 0 1-.5-.5zm3 0a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 0 1h-1a.5.5 0 0 1-.5-.5zm3 0a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 0 1h-1a.5.5 0 0 1-.5-.5z"/>
        </svg>
    </div>
    <h1 class="display-4 fw-bold text-primary mb-3">Karte antippen</h1>
    <p class="fs-5 text-muted">Halte deine NFC-Karte an den Leser, um ein Getränk zu kaufen.</p>
</div>
{% endblock %}

{% block extra_script %}
<script>
    /* Poll for state changes every 500 ms and navigate when something happens. */
    let lastVersion = null;
    setInterval(async () => {
        try {
            const resp = await fetch('/api/state');
            const data = await resp.json();
            if (lastVersion === null) { lastVersion = data.version; return; }
            if (data.version !== lastVersion) {
                window.location.href = '/';
            }
        } catch (_) {}
    }, 500);
</script>
{% endblock %}
